name: Instagram Auto-Poster

# SCHEDULE DISABLED - Will not post automatically
# To enable: uncomment the schedule section below
on:
  # schedule:
  #   - cron: '0 7,9,12,15,18,21 * * *'
  workflow_dispatch:
    inputs:
      use_ai_images:
        description: 'Use AI-generated images (Pollinations.ai - FREE)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Create images directory
        run: mkdir -p images

      - name: Run Instagram poster
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          IMAGE_SOURCE: ${{ secrets.IMAGE_SOURCE }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NICHE: ${{ secrets.NICHE }}
          LOG_LEVEL: INFO
          USE_AI_IMAGES: ${{ github.event.inputs.use_ai_images || 'false' }}
        run: |
          if [ "$USE_AI_IMAGES" = "true" ]; then
            python main.py --ai
          else
            python main.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: instagram_bot.log
